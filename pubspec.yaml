# pubspec.yaml
name: flutter_inventario_app
description: Flutter Inventario App — Cliente móvil para InventarioAPI
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ────────────────────────────────────────────
  go_router: ^14.2.7

  # ── HTTP ─────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Almacenamiento seguro ─────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Imágenes ─────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ── Modelos / serialización ───────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Configuración / entorno ───────────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Utilidades ────────────────────────────────────────────
  intl: ^0.19.0

  image_picker: ^1.2.2          # Seleccionar imagen de galería / cámara
  http: ^1.6.0                  # MultipartRequest para subir archivos

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Generadores de código ─────────────────────────────────
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - .env